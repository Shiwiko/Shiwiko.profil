<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Shiwiko</title>
<link rel="stylesheet" href="profil.css">
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop id="bg-video">
  <source src="background.mp4" type="video/mp4">
</video>

<!-- PLAYER EN HAUT -->
<div class="top-player">
  <button onclick="playMusic()">Play</button>
  <button onclick="stopMusic()">Stop</button>
  Volume
  <input type="range" min="0" max="1" step="0.1" onchange="setVolume(this.value)">
  <button onclick="toggleMusicMenu()">Musique</button>
</div>

<!-- MENU MUSIQUE -->
<div class="music-menu" id="musicMenu">
  <button onclick="changeMusic('music1.mp3')">Musique 1</button>
  <button onclick="changeMusic('music2.mp3')">Musique 2</button>
  <button onclick="changeMusic('music3.mp3')">Musique 3</button>
</div>

<!-- CONTENU -->
<div class="content">

  <!-- PROFIL -->
  <div class="profile">
    <img src="https://i.postimg.cc/vBfCMhP8/b4db858757df355a17ac4743ace291b7.jpg" alt="Profil">
  </div>

  <!-- DESCRIPTION -->
  <div class="description">
    Bienvenue sur mon site
  </div>

  <!-- BOUTONS -->
  <div class="buttons">
    <a class="link-btn" href="https://youtube.com">
      <img src="https://i.postimg.cc/Y0xS2Z8h/youtube.png" alt="YouTube">
      <span>Youtube</span>
    </a>

    <a class="link-btn" href="https://discord.com">
      <img src="https://i.postimg.cc/SQ5mm1QT/85e9d74f125bb82aa4be2478ce02bbd4.jpg" alt="Discord">
      <span>Discord</span>
    </a>

    <a class="link-btn" href="https://twitter.com">
      <img src="https://i.postimg.cc/8P3GkxMf/twitter.png" alt="Twitter">
      <span>Twitter</span>
    </a>
  </div>
</div>

<!-- AUDIO -->
<audio id="music" src="music1.mp3"></audio>

<script>
let music = document.getElementById("music");

function playMusic(){ music.play(); }
function stopMusic(){ music.pause(); }
function setVolume(v){ music.volume = v; }

function changeMusic(src){
  music.src = src;
  music.play();
}

function toggleMusicMenu(){
  let menu = document.getElementById("musicMenu");
  if(menu.style.display === "block"){
    menu.style.display = "none";
  } else {
    menu.style.display = "block";
  }
}
</script>

</body>
</html>
