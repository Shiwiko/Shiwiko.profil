<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Shiwiko</title>
<link rel="stylesheet" href="profil.css">
</head>

<body>

<!-- VIDEO + AUDIO BACKGROUND -->
<video autoplay muted loop id="bg-video" playsinline>
  <source src="https://n.uguu.se/aYCGxlGg.mp4" type="video/mp4">
</video>

<!-- PLAYER EN HAUT -->
<div class="top-player">
  Volume
  <input type="range" min="0" max="1" step="0.1" onchange="setVolume(this.value)">
  <button onclick="toggleVideoMenu()">Choisir Vidéo</button>
</div>

<!-- MENU VIDÉOS -->
<div class="music-menu" id="videoMenu" style="display:none;">
  <button onclick="changeVideo('https://n.uguu.se/aYCGxlGg.mp4')">Vidéo 1</button>
  <button onclick="changeVideo('https://n.uguu.se/example2.mp4')">Vidéo 2</button>
  <button onclick="changeVideo('https://n.uguu.se/example3.mp4')">Vidéo 3</button>
</div>

<!-- CONTENU -->
<div class="content">

  <!-- PROFIL -->
  <div class="profile">
    <img src="https://i.postimg.cc/vBfCMhP8/b4db858757df355a17ac4743ace291b7.jpg" alt="Profil">
  </div>

  <!-- DESCRIPTION -->
  <div class="description">
    Bienvenue sur mon site
  </div>

  <!-- BOUTONS -->
  <div class="buttons">
    <a class="link-btn" href="https://youtube.com">
      <img src="https://i.postimg.cc/Y0xS2Z8h/youtube.png" alt="YouTube">
      <span>Youtube</span>
    </a>

    <a class="link-btn" href="https://discord.com">
      <img src="https://i.postimg.cc/SQ5mm1QT/85e9d74f125bb82aa4be2478ce02bbd4.jpg" alt="Discord">
      <span>Discord</span>
    </a>

    <a class="link-btn" href="https://twitter.com">
      <img src="https://i.postimg.cc/8P3GkxMf/twitter.png" alt="Twitter">
      <span>Twitter</span>
    </a>
  </div>
</div>

<script>
let video = document.getElementById("bg-video");

// Volume initial
video.volume = 0.5;

// Changer la vidéo
function changeVideo(videoSrc){
  video.src = videoSrc;
  video.play();
}

// Régler le volume
function setVolume(v){
  video.volume = v;
}

// Toggle menu vidéo
function toggleVideoMenu(){
  let menu = document.getElementById("videoMenu");
  if(menu.style.display === "block"){
    menu.style.display = "none";
  } else {
    menu.style.display = "block";
  }
}

// Auto play vidéo au chargement
window.addEventListener('load', () => {
  video.play();
});
</script>

</body>
</html>
