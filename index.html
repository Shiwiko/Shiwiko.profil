<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Profil</title>
<link rel="stylesheet" href="profil.css">
</head>
<body>

<video id="bg-video" loop autoplay playsinline>
  <source src="https://image2url.com/r2/default/videos/1773185231453-f7b4bbe6-dedd-4215-9109-fbd21ffab100.mp4" type="video/mp4">
</video>

<div class="content">

  <div class="profile-card">

    <div class="profile-banner">
      <img src="https://i.postimg.cc/yNx2k9PC/e2a8dac3f69e6677326b1d0f9d510925.gif" alt="Bannière">
    </div>

    <div class="profile-img">
      <img src="https://i.postimg.cc/vBfCMhP8/b4db858757df355a17ac4743ace291b7.jpg" alt="Profil">
    </div>

    <div class="profile-name">
    </div>

    <div class="buttons">
      <a class="link-btn" href="https://discord.gg/xQDUzqXdfC" target="_blank">
        <img src="https://i.postimg.cc/Pqh3GDC0/file-000000007a2871f5805221693654cefe.png" alt="Discord">
        <span>Serveur Shop & Middleman</span>
      </a>

      <a class="link-btn" href="https://discord.gg/2SjKY6eU4n" target="_blank">
        <img src="https://i.postimg.cc/pVhL55Tb/a87afed6ec0b6621af36c8cea7679c83.webp" alt="Discord2">
        <span>Serveur Blox Fruit</span>
      </a>

      <a class="link-btn" href="https://discord.gg/jmgRTzWbdu" target="_blank">
        <img src="https://i.postimg.cc/3RDQNpZ6/ff623e6ef3a9afe32edcdcc6a505857a.webp" alt="Discord3">
        <span>Serveur Publicité</span>
      </a>

      <a class="link-btn" href="https://discord.gg/jmgRTzWbdu" target="_blank">
        <img src="https://i.postimg.cc/3RDQNpZ6/ff623e6ef3a9afe32edcdcc6a505857a.webp" alt="Discord3">
        <span>Serveur Publicité</span>
      </a>
    </div>

  </div>
</div>

<script>
let video = document.getElementById("bg-video");
video.volume = 0.5;

window.addEventListener("load", () => {
  const items = document.querySelectorAll(".profile-card, .link-btn");
  items.forEach((el, i) => {
    el.style.opacity = 0;
    el.style.transform = "translateY(20px)";
    setTimeout(() => {
      el.style.transition = "all 0.6s ease-out";
      el.style.opacity = 1;
      el.style.transform = "translateY(0)";
    }, i * 200);
  });
});
</script>

</body>
</html>
