<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Profil</title>
<link rel="stylesheet" href="profil.css">
</head>
<body>

<video id="bg-video" loop autoplay muted playsinline>
  <source src="https://n.uguu.se/aYCGxlGg.mp4" type="video/mp4">
</video>

<div class="content">

  <div class="profile-card">

    <div class="profile-banner">
      <img src="https://i.postimg.cc/yNx2k9PC/e2a8dac3f69e6677326b1d0f9d510925.gif" alt="Bannière">
    </div>

    <div class="profile-img">
      <img src="https://i.postimg.cc/vBfCMhP8/b4db858757df355a17ac4743ace291b7.jpg" alt="Profil">
    </div>

    <div class="profile-name">
      <!-- Espace conservé sous le profil pour séparer les boutons -->
    </div>

    <div class="buttons">
      <a class="link-btn" href="https://youtube.com">
        <img src="https://i.postimg.cc/Y0xS2Z8h/youtube.png" alt="YouTube">
        <span>Youtube</span>
      </a>

      <a class="link-btn" href="https://discord.com">
        <img src="https://i.postimg.cc/SQ5mm1QT/85e9d74f125bb82aa4be2478ce02bbd4.jpg" alt="Discord">
        <span>Discord</span>
      </a>

      <a class="link-btn" href="https://twitter.com">
        <img src="https://i.postimg.cc/8P3GkxMf/twitter.png" alt="Twitter">
        <span>Twitter</span>
      </a>
    </div>

  </div>
</div>

<script>
let video = document.getElementById("bg-video");
video.volume = 0.5;

window.addEventListener("load", () => {
  // Animation d'apparition
  const items = document.querySelectorAll(".profile-card, .link-btn");
  items.forEach((el, i) => {
    el.style.opacity = 0;
    el.style.transform = "translateY(20px)";
    setTimeout(() => {
      el.style.transition = "all 0.6s ease-out";
      el.style.opacity = 1;
      el.style.transform = "translateY(0)";
    }, i * 200);
  });
});
</script>

</body>
</html>
